<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipLingua</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<main class="container">

    <h1>🎧 ClipLingua</h1>

    <p class="subtitle">
        Pesquise uma palavra ou expressão em inglês.
    </p>

    <form method="GET" class="search-box">

        <input
            type="text"
            name="q"
            value="{{ query }}"
            placeholder="Ex.: football player">

        <button type="submit">
            Pesquisar
        </button>

    </form>

    {% if results %}

    <div class="player-area">

        <video
            id="player"
            width="800"
            controls
            preload="metadata">
        </video>

        <div id="subtitle" class="subtitle-player"></div>

        <h2 id="video-name"></h2>

        <p id="sentence"></p>

        <div class="controls">

            <button type="button" onclick="previousResult()">
                ⬅ Anterior
            </button>

            <span id="counter"></span>

            <button type="button" onclick="nextResult()">
                Próximo ➡
            </button>

        </div>

    </div>

    <hr>

    <h2>Ocorrências</h2>

    <div class="results">

        {% for result in results %}

        <div
            class="result"
            onclick="playResult({{ loop.index0 }})">

            <strong>{{ result.video.name }}</strong>

            <br><br>

            {{ result.sentence }}

            <br><br>

            <small>
                {{ "%.2f"|format(result.start) }}s
            </small>

        </div>

        {% endfor %}

    </div>

    {% endif %}

</main>

<script>

const results = [

{% for result in results %}
{
    video: "{{ url_for('video', filename=result.video.name) }}",

    name: {{ result.video.name|tojson }},

    sentence: {{ result.sentence|tojson }},

    start: {{ result.start }},

    words: [
        {% for word in result.words %}
        {
            text: {{ word.text|tojson }},
            start: {{ word.start }},
            end: {{ word.end }}
        },
        {% endfor %}
    ],

    transcript: [
        {% for occurrence in result.transcript %}
        {
            sentence: {{ occurrence.sentence|tojson }},

            start: {{ occurrence.start }},

            end: {{ occurrence.end }},

            words: [

                {% for word in occurrence.words %}
                {
                    text: {{ word.text|tojson }},
                    start: {{ word.start }},
                    end: {{ word.end }}
                },
                {% endfor %}

            ]
        },
        {% endfor %}
    ]
},
{% endfor %}

];

</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
